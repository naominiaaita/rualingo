spring.application.name=rualingo-test

# Use in-memory DB for tests (avoid relying on local MySQL).
spring.datasource.url=jdbc:h2:mem:rualingo_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.sql.init.mode=never

logging.level.root=WARN
logging.level.org.springframework=WARN

app.auth.google.client-id=test-client-id
app.auth.jwt.secret=test-secret-test-secret-test-secret-test-secret
app.auth.jwt.expiration-ms=86400000
