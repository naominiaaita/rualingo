server.address=0.0.0.0
spring.application.name=rualingo
spring.datasource.url=jdbc:mysql://localhost:3306/${RUALINGO_DB_NAME:rualingo_db}?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=10iaanst

# Hibernate/JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.sql.init.mode=never

# LOGGING - These are the lines that stop the "Did not match" reports
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.com.example.rualingo=DEBUG

# App Security Settings
app.auth.google.client-id=
app.auth.jwt.secret=replace-this-with-a-long-random-secret-key-for-rualingo-auth
app.auth.jwt.expiration-ms=86400000
